<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e1015">
<title>Clara · Acompanhamento</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230e1015'/%3E%3Cpath d='M28 38v24M72 38v24M22 50h12M66 50h12M34 44v12M66 44v12M40 50h20' stroke='%23e8a23a' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
  :root {
    --bg: #08090d;
    --bg-elev: #12141b;
    --bg-elev-2: #181b24;
    --bg-elev-3: #20242f;
    --line: rgba(255,255,255,0.06);
    --line-strong: rgba(255,255,255,0.12);
    --ink: #f5f5f7;
    --ink-dim: #989bA8;
    --ink-faint: #5e6170;
    --neon: #39ff9e;
    --neon-soft: rgba(57,255,158,0.12);
    --neon-glow: rgba(57,255,158,0.35);
    --violet: #9d7fff;
    --violet-soft: rgba(157,127,255,0.12);
    --coral: #ff6b8b;
    --coral-soft: rgba(255,107,139,0.12);
    --cyan: #4fd5e8;
    --cyan-soft: rgba(79,213,232,0.12);
    --serif: "Source Serif 4", Georgia, serif;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: "JetBrains Mono", "SF Mono", monospace;
    --r-lg: 20px;
    --r-md: 15px;
    --r-sm: 10px;
    --shadow-card: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px -8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    --shadow-hero: 0 2px 4px rgba(0,0,0,0.3), 0 20px 50px -15px rgba(57,255,158,0.15), inset 0 1px 0 rgba(255,255,255,0.06);
    --shadow-float: 0 4px 12px rgba(0,0,0,0.4), 0 16px 40px -12px rgba(0,0,0,0.6);
    --shadow-press: inset 0 1px 3px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 92px) env(safe-area-inset-left);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 15% 0%, rgba(57,255,158,0.06), transparent 40%),
      radial-gradient(circle at 100% 30%, rgba(157,127,255,0.05), transparent 45%);
    background-attachment: fixed;
  }
  button { font-family: var(--sans); cursor: pointer; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 26px 18px 0; }

  /* ---------- HEADER ---------- */
  header.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand-mark {
    width: 36px; height: 36px;
    background: linear-gradient(160deg, var(--bg-elev-3), var(--bg-elev));
    border: 1px solid var(--line-strong);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: var(--shadow-card), 0 0 16px -4px var(--neon-glow);
  }
  .brand-mark svg { width: 18px; height: 18px; filter: drop-shadow(0 0 6px var(--neon-glow)); }
  .brand-text h1 {
    font-family: var(--serif);
    font-size: 18.5px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.1px;
  }
  .brand-text p {
    font-size: 10.5px;
    color: var(--ink-faint);
    margin: 1px 0 0;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .header-day {
    text-align: right;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    line-height: 1.5;
  }

  /* ---------- BOTTOM NAV ---------- */
  nav.bottomnav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    background: rgba(8,9,13,0.85);
    backdrop-filter: blur(24px) saturate(1.4);
    border-top: 1px solid var(--line);
    padding: 10px 14px calc(env(safe-area-inset-bottom) + 10px);
    z-index: 50;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.35);
  }
  nav.bottomnav button {
    background: none; border: none;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    color: var(--ink-faint);
    font-size: 10.5px;
    padding: 6px 0;
    letter-spacing: 0.2px;
    position: relative;
    transition: color 0.2s;
  }
  nav.bottomnav button svg { width: 21px; height: 21px; transition: filter 0.25s, stroke 0.2s; }
  nav.bottomnav button.active { color: var(--neon); }
  nav.bottomnav button.active svg { filter: drop-shadow(0 0 8px var(--neon-glow)); }

  section.page { display: none; }
  section.page.visible { display: block; animation: fadeUp 0.35s cubic-bezier(.16,1,.3,1); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ---------- SHARED ---------- */
  .section-title {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 1.1px;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 24px 0 11px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title:first-child { margin-top: 0; }
  .card {
    background: linear-gradient(160deg, var(--bg-elev-2), var(--bg-elev));
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-card);
  }

  /* ---------- HOME ---------- */
  .hero-stat {
    border-radius: var(--r-lg);
    padding: 24px 22px;
    margin-bottom: 14px;
    background: linear-gradient(165deg, rgba(57,255,158,0.1), rgba(57,255,158,0.02) 60%, var(--bg-elev));
    border: 1px solid rgba(57,255,158,0.22);
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-hero);
  }
  .hero-stat::after {
    content: '';
    position: absolute; top: -40%; right: -20%;
    width: 200px; height: 200px;
    background: radial-gradient(circle, var(--neon-soft), transparent 70%);
    pointer-events: none;
  }
  .hero-stat .eyebrow {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--neon);
    margin: 0 0 9px;
    display: flex; align-items: center; gap: 6px;
    position: relative; z-index: 1;
  }
  .hero-stat .eyebrow::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 8px 1px var(--neon-glow);
  }
  .hero-stat .big {
    font-family: var(--serif);
    font-size: 40px;
    font-weight: 600;
    margin: 0;
    line-height: 1;
    position: relative; z-index: 1;
  }
  .hero-stat .big small { font-size: 17px; font-weight: 500; color: var(--ink-dim); }
  .hero-stat .sub { font-size: 12.5px; color: var(--ink-dim); margin: 7px 0 0; position: relative; z-index: 1; }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat-box {
    background: linear-gradient(160deg, var(--bg-elev-2), var(--bg-elev));
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 15px 16px;
    box-shadow: var(--shadow-card);
  }
  .stat-box .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 0 0 6px;
    display: flex; align-items: center; gap: 5px;
  }
  .stat-box .stat-label svg { width: 12px; height: 12px; opacity: 0.7; }
  .stat-box .stat-value {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    margin: 0;
  }
  .stat-value.tone-neon { color: var(--neon); text-shadow: 0 0 14px var(--neon-glow); }
  .stat-value.tone-coral { color: var(--coral); text-shadow: 0 0 14px var(--coral-soft); }
  .stat-box .stat-foot { font-size: 11px; color: var(--ink-faint); margin: 3px 0 0; }

  .next-dose-row {
    display: flex;
    align-items: center;
    gap: 13px;
    background: linear-gradient(160deg, var(--bg-elev-2), var(--bg-elev));
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 14px 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-card);
  }
  .next-dose-icon {
    width: 40px; height: 40px;
    border-radius: 11px;
    background: linear-gradient(160deg, var(--cyan-soft), rgba(79,213,232,0.04));
    border: 1px solid rgba(79,213,232,0.2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 14px -4px rgba(79,213,232,0.3);
  }
  .next-dose-icon svg { width: 19px; height: 19px; color: var(--cyan); }
  .next-dose-text p:first-child { font-size: 13.5px; margin: 0; font-weight: 500; }
  .next-dose-text p:last-child { font-size: 11.5px; color: var(--ink-faint); margin: 2px 0 0; }

  /* ---------- TREINO ---------- */
  .day-rail {
    display: flex;
    gap: 7px;
    margin-bottom: 18px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .day-rail::-webkit-scrollbar { display: none; }
  .day-pill {
    flex-shrink: 0;
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    padding: 10px 16px;
    border-radius: var(--r-sm);
    border: 1px solid var(--line);
    background: var(--bg-elev);
    color: var(--ink-dim);
    transition: all 0.2s;
    position: relative;
    box-shadow: var(--shadow-card);
  }
  .day-pill.active {
    border-color: rgba(57,255,158,0.4);
    color: var(--neon);
    background: linear-gradient(160deg, var(--neon-soft), var(--bg-elev));
    box-shadow: var(--shadow-card), 0 0 18px -6px var(--neon-glow);
  }
  .day-pill .dot {
    position: absolute; top: 6px; right: 7px;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 6px 1px var(--neon-glow);
  }

  .day-banner {
    border-radius: var(--r-lg);
    padding: 22px 22px 20px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--line);
    box-shadow: var(--shadow-card);
  }
  .day-banner .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.8;
    margin: 0 0 6px;
  }
  .day-banner h2 {
    font-family: var(--serif);
    font-size: 25px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: 0.1px;
  }
  .day-banner .meta {
    font-size: 12.5px;
    opacity: 0.75;
    margin: 0;
  }
  .day-banner .glyph {
    position: absolute;
    right: -6px; top: -10px;
    width: 90px; height: 90px;
    opacity: 0.1;
  }
  .day-banner .complete-btn {
    margin-top: 13px;
    background: rgba(0,0,0,0.25);
    border: 1px solid currentColor;
    color: inherit;
    opacity: 0.9;
    border-radius: 9px;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    backdrop-filter: blur(8px);
  }
  .day-banner .complete-btn svg { width: 13px; height: 13px; }
  .day-banner.logged .complete-btn { background: rgba(0,0,0,0.4); box-shadow: 0 0 16px -4px currentColor; }

  .ex-list { display: flex; flex-direction: column; gap: 9px; margin-bottom: 20px; }
  .ex-row {
    display: flex;
    align-items: center;
    gap: 13px;
    background: linear-gradient(160deg, var(--bg-elev-2), var(--bg-elev));
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 13px 15px;
    box-shadow: var(--shadow-card);
  }
  .ex-bullet { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-faint); flex-shrink: 0; }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-size: 14px; margin: 0; }
  .ex-sets { font-family: var(--mono); font-size: 11.5px; color: var(--ink-faint); white-space: nowrap; }

  .week-overview {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 7px;
    margin-bottom: 18px;
  }
  .week-overview .wo-day {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    padding: 10px 4px;
    text-align: center;
    box-shadow: var(--shadow-card);
  }
  .week-overview .wo-day.done {
    border-color: rgba(57,255,158,0.35);
    background: linear-gradient(160deg, var(--neon-soft), var(--bg-elev));
    box-shadow: var(--shadow-card), 0 0 14px -6px var(--neon-glow);
  }
  .week-overview .wo-day .wo-label { font-family: var(--mono); font-size: 9.5px; color: var(--ink-faint); text-transform: uppercase; margin: 0 0 5px; }
  .week-overview .wo-day.done .wo-label { color: var(--neon); }
  .week-overview .wo-day svg { width: 13px; height: 13px; }

  /* ---------- REMÉDIO ---------- */
  .field { margin-bottom: 14px; }
  .field label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--ink-dim);
    margin-bottom: 7px;
  }
  .field label .optional-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line-strong);
    border-radius: 11px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: var(--sans);
    color: var(--ink);
    box-shadow: var(--shadow-press);
  }
  .field textarea { resize: none; min-height: 60px; font-family: var(--sans); }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: rgba(57,255,158,0.5);
    box-shadow: var(--shadow-press), 0 0 0 3px var(--neon-soft);
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }

  .site-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .site-btn {
    background: var(--bg);
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    padding: 10px 4px;
    font-size: 11px;
    color: var(--ink-dim);
    text-align: center;
    box-shadow: var(--shadow-press);
  }
  .site-btn.active {
    border-color: rgba(157,127,255,0.5);
    color: var(--violet);
    background: linear-gradient(160deg, var(--violet-soft), var(--bg));
    box-shadow: var(--shadow-press), 0 0 14px -4px var(--violet-soft);
  }

  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .chip {
    background: var(--bg);
    border: 1px solid var(--line-strong);
    border-radius: 22px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--ink-dim);
    box-shadow: var(--shadow-press);
  }
  .chip.active {
    border-color: rgba(255,107,139,0.5);
    color: var(--coral);
    background: linear-gradient(160deg, var(--coral-soft), var(--bg));
    box-shadow: var(--shadow-press), 0 0 14px -4px var(--coral-soft);
  }

  .btn-primary {
    width: 100%;
    background: linear-gradient(160deg, #4dffaa, var(--neon));
    color: #061008;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 14.5px;
    font-weight: 700;
    margin-top: 4px;
    box-shadow: 0 4px 14px -2px var(--neon-glow), inset 0 1px 0 rgba(255,255,255,0.4);
    letter-spacing: 0.1px;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-ghost {
    width: 100%;
    background: var(--bg-elev);
    color: var(--ink-dim);
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    padding: 12px;
    font-size: 13.5px;
    font-weight: 500;
  }

  .chart-wrap { position: relative; height: 170px; margin-bottom: 4px; }

  .timeline { display: flex; flex-direction: column; }
  .t-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }
  .t-row:last-child { border-bottom: none; }
  .t-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--neon); flex-shrink: 0; margin-top: 6px; box-shadow: 0 0 6px 1px var(--neon-glow); }
  .t-body { flex: 1; min-width: 0; }
  .t-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .t-date { font-family: var(--mono); font-size: 12px; color: var(--ink-dim); }
  .t-weight { font-size: 14px; font-weight: 600; }
  .t-dose-tag {
    font-family: var(--mono); font-size: 10px; color: var(--cyan);
    background: var(--cyan-soft); padding: 2px 8px; border-radius: 20px;
    border: 1px solid rgba(79,213,232,0.2);
  }
  .t-delta { font-family: var(--mono); font-size: 11.5px; color: var(--neon); }
  .t-delta.up { color: var(--coral); }
  .t-meta { font-size: 11.5px; color: var(--ink-faint); margin: 4px 0 0; }
  .t-side-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .t-side-tag {
    font-size: 10px; color: var(--coral); background: var(--coral-soft);
    padding: 2px 8px; border-radius: 20px; border: 1px solid rgba(255,107,139,0.2);
  }
  .t-del { background: none; border: none; color: var(--ink-faint); padding: 4px 6px; font-size: 14px; flex-shrink: 0; }
  .empty-state { text-align: center; padding: 32px 0; color: var(--ink-faint); font-size: 13px; }

  /* ---------- MODAL / SHEET ---------- */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: flex-end;
  }
  .sheet-overlay.visible { display: flex; }
  .sheet {
    background: linear-gradient(180deg, var(--bg-elev-2), var(--bg-elev));
    border-top: 1px solid var(--line-strong);
    border-radius: 26px 26px 0 0;
    padding: 22px 18px calc(env(safe-area-inset-bottom) + 20px);
    width: 100%;
    max-height: 86vh;
    overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(.16,1,.3,1);
    box-shadow: 0 -20px 60px rgba(0,0,0,0.5);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle { width: 38px; height: 4px; background: var(--line-strong); border-radius: 4px; margin: 0 auto 18px; }
  .sheet-title { font-family: var(--serif); font-size: 18.5px; font-weight: 600; margin: 0 0 18px; }

  .toast {
    position: fixed;
    bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: linear-gradient(160deg, var(--bg-elev-3), var(--bg-elev-2));
    border: 1px solid var(--line-strong);
    color: var(--ink);
    padding: 12px 19px;
    border-radius: 30px;
    font-size: 13px;
    display: flex; align-items: center; gap: 9px;
    z-index: 200;
    opacity: 0;
    transition: all 0.25s cubic-bezier(.16,1,.3,1);
    pointer-events: none;
    white-space: nowrap;
    box-shadow: var(--shadow-float);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast svg { width: 15px; height: 15px; color: var(--neon); flex-shrink: 0; filter: drop-shadow(0 0 6px var(--neon-glow)); }
</style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#39ff9e" stroke-width="2" stroke-linecap="round"><path d="M6 9v6M18 9v6M4 12h3M17 12h3M8 10v4M16 10v4M9 12h6"/></svg>
      </div>
      <div class="brand-text">
        <h1>Clara</h1>
        <p id="header-sub">acompanhamento</p>
      </div>
    </div>
    <div class="header-day" id="today-chip"></div>
  </header>

function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }

}

/* ============ HOME / DASHBOARD ============ */
function renderHomePage() {
  var registros = getRegistros().slice().sort(function(a, b) { return new Date(a.data) - new Date(b.data); });
  var logs = getLogs();
  var today = isoToday();

  var home = document.getElementById('page-home');
  var html = '';

  // hero: peso atual + variação
  if (registros.length > 0) {
    var first = registros[0].peso;
    var last = registros[registros.length - 1];
    var hasPeso = typeof last.peso === 'number';
    if (hasPeso) {
      var diff = (last.peso - first).toFixed(1);
      html += '<div class="hero-stat">' +
        '<p class="eyebrow">peso atual</p>' +
        '<p class="big">' + last.peso + '<small> kg</small></p>' +
        '<p class="sub">' + (diff <= 0 ? '↓ ' : '↑ ') + Math.abs(diff) + ' kg desde o início do registro</p>' +
      '</div>';
    }
  } else {
    html += '<div class="hero-stat"><p class="eyebrow">peso atual</p><p class="big">—</p><p class="sub">registre sua primeira aplicação para começar</p></div>';
  }

  // stats grid: treinos na semana + próxima dose
  var weekKey = getWeekKey();
  var weekLog = logs[weekKey] || {};
  var doneCount = 0;
  for (var k in weekLog) if (weekLog[k]) doneCount++;

  var nextDoseInfo = getNextDoseInfo(registros);

  html += '<div class="stat-grid">' +
    '<div class="stat-box"><p class="stat-label">' + ICONS.flame + ' treinos na semana</p><p class="stat-value">' + doneCount + '<span style="font-size:13px; color:var(--ink-faint);">/5</span></p></div>' +
    '<div class="stat-box"><p class="stat-label">' + ICONS.syringe + ' próxima dose</p><p class="stat-value' + (nextDoseInfo.urgent ? ' tone-coral' : '') + '">' + nextDoseInfo.label + '</p><p class="stat-foot">' + nextDoseInfo.sub + '</p></div>' +
  '</div>';

  // treino de hoje
  var todayDay = DAYS.filter(function(d) { return d.id === todayDayId(); })[0];
  if (todayDay) {
    var tone = TONES[todayDay.tone];
    var doneToday = !!weekLog[todayDay.id];
    html += '<p class="section-title">Treino de hoje</p>' +
      '<div class="day-banner' + (doneToday ? ' logged' : '') + '" style="background:' + tone.bg + '; color:' + tone.fg + ';">' +
        '<svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="' + tone.fg + '" stroke-width="1.6" stroke-linecap="round"><path d="' + todayDay.icon + '"/></svg>' +
        '<p class="eyebrow">' + dayNamesFull[todayIdx] + '-feira</p>' +
        '<h2>' + todayDay.title + '</h2>' +
        '<p class="meta">' + todayDay.exercises.length + ' exercícios</p>' +
        '<button class="complete-btn" id="home-toggle-done">' + (doneToday ? ICONS.check + ' Concluído' : 'Marcar como feito') + '</button>' +
      '</div>';
  }

  home.innerHTML = html;

  var toggleBtn = document.getElementById('home-toggle-done');
  if (toggleBtn) {
    toggleBtn.onclick = function() {
      var logs = getLogs();
      var wk = getWeekKey();
      if (!logs[wk]) logs[wk] = {};
      logs[wk][todayDay.id] = !logs[wk][todayDay.id];
      saveLogs(logs);
      renderHomePage();
    };
  }
}

function getWeekKey() {
  var d = new Date();
  var onejan = new Date(d.getFullYear(), 0, 1);
  var week = Math.ceil((((d - onejan) / 86400000) + onejan.getDay() + 1) / 7);
  return d.getFullYear() + '-w' + week;
}

function getNextDoseInfo(registrosSorted) {
  if (registrosSorted.length === 0) return { label: '—', sub: 'sem registros ainda', urgent: false };
  var last = registrosSorted[registrosSorted.length - 1];
  var lastDate = last.data;
  var next = new Date(lastDate);
  next.setDate(next.getDate() + 7);
  var nextIso = next.toISOString().slice(0, 10);
  var diff = daysBetween(isoToday(), nextIso);
  if (diff < 0) return { label: 'atrasada', sub: Math.abs(diff) + ' dia(s) após o previsto', urgent: true };
  if (diff === 0) return { label: 'hoje', sub: formatDateBR(nextIso), urgent: true };
  if (diff === 1) return { label: 'amanhã', sub: formatDateBR(nextIso), urgent: false };
  return { label: 'em ' + diff + 'd', sub: formatDateBR(nextIso), urgent: false };
}

/* ============ REMÉDIO PAGE ============ */
var showAllHistory = false;

function drawChart(registros) {
  var canvas = document.getElementById('chart');
  var wrap = canvas.parentElement;
  var dpr = window.devicePixelRatio || 1;
  var w = wrap.clientWidth, h = wrap.clientHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  var withWeight = registros.filter(function(r) { return typeof r.peso === 'number'; })
    .slice().sort(function(a, b) { return new Date(a.data) - new Date(b.data); });

  if (withWeight.length < 2) {
    ctx.fillStyle = '#686c78';
    ctx.font = '12.5px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Registre ao menos 2 pesagens para ver o gráfico', w / 2, h / 2);
    return;
  }

  var weights = withWeight.map(function(r) { return r.peso; });
  var min = Math.min.apply(null, weights), max = Math.max.apply(null, weights);
  var pad = (max - min) * 0.18 || 1;
  min -= pad; max += pad;

  var padX = 8, padY = 16;
  var plotW = w - padX * 2, plotH = h - padY * 2;
  function xAt(i) { return padX + (plotW * i) / (withWeight.length - 1); }
  function yAt(v) { return padY + plotH - ((v - min) / (max - min)) * plotH; }

  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  for (var g = 0; g <= 2; g++) {
    var gy = padY + (plotH * g) / 2;
    ctx.beginPath(); ctx.moveTo(padX, gy); ctx.lineTo(w - padX, gy); ctx.stroke();
  }

  ctx.beginPath();
  withWeight.forEach(function(r, i) {
    var x = xAt(i), y = yAt(r.peso);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.shadowColor = 'rgba(57,255,158,0.5)'; ctx.shadowBlur = 8;
  ctx.strokeStyle = '#39ff9e'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();
  ctx.shadowBlur = 0;

  var grad = ctx.createLinearGradient(0, padY, 0, padY + plotH);
  grad.addColorStop(0, 'rgba(232,162,58,0.16)');
  grad.addColorStop(1, 'rgba(232,162,58,0)');
  ctx.lineTo(xAt(withWeight.length - 1), padY + plotH);
  ctx.lineTo(xAt(0), padY + plotH);
  ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

  withWeight.forEach(function(r, i) {
    var x = xAt(i), y = yAt(r.peso);
    ctx.beginPath();
    ctx.arc(x, y, i === withWeight.length - 1 ? 4 : 2.3, 0, Math.PI * 2);
    ctx.fillStyle = i === withWeight.length - 1 ? '#39ff9e' : '#2a9d6b';
    ctx.fill();
  });

  var last = withWeight[withWeight.length - 1];
  ctx.fillStyle = '#f5f5f7';
  ctx.font = '600 13px Inter, sans-serif';
  ctx.textAlign = 'right';
  var ly = yAt(last.peso);
  ctx.fillText(last.peso + ' kg', w - padX, ly - 12 < padY + 10 ? ly + 18 : ly - 10);
}

function renderRemedioPage() {
  var registros = getRegistros();
  var sorted = registros.slice().sort(function(a, b) { return new Date(a.data) - new Date(b.data); });
  var withWeight = sorted.filter(function(r) { return typeof r.peso === 'number'; });

  var statsEl = document.getElementById('med-stats');
  var totalAplicacoes = registros.length;
  var variacao = '—';
  var toneClass = '';
  if (withWeight.length >= 2) {
    var d = (withWeight[withWeight.length - 1].peso - withWeight[0].peso).toFixed(1);
    variacao = (d > 0 ? '+' : '') + d + ' kg';
    toneClass = d <= 0 ? 'tone-neon' : 'tone-coral';
  }
  statsEl.innerHTML =
    '<div class="stat-box"><p class="stat-label">' + ICONS.syringe + ' aplicações</p><p class="stat-value">' + totalAplicacoes + '</p></div>' +
    '<div class="stat-box"><p class="stat-label">' + ICONS.trend + ' variação total</p><p class="stat-value ' + toneClass + '">' + variacao + '</p></div>';

  var nextDoseInfo = getNextDoseInfo(sorted);
  document.getElementById('next-dose-row').innerHTML =
    '<div class="next-dose-icon">' + ICONS.calendar + '</div>' +
    '<div class="next-dose-text"><p>Próxima aplicação: ' + nextDoseInfo.label + '</p><p>' + nextDoseInfo.sub + '</p></div>';

  drawChart(registros);

  var ordenadosDesc = sorted.slice().reverse();
  var visibleList = showAllHistory ? ordenadosDesc : ordenadosDesc.slice(0, 5);
  var tl = document.getElementById('timeline');

  if (ordenadosDesc.length === 0) {
    tl.innerHTML = '<div class="empty-state">Nenhuma aplicação registrada ainda</div>';
  } else {
    tl.innerHTML = visibleList.map(function(r) {
      var idxInSorted = sorted.indexOf(r);
      var prevWithWeight = null;
      for (var i = idxInSorted - 1; i >= 0; i--) {
        if (typeof sorted[i].peso === 'number') { prevWithWeight = sorted[i]; break; }
      }
      var delta = '';
      if (typeof r.peso === 'number' && prevWithWeight) {
        var dd = (r.peso - prevWithWeight.peso).toFixed(1);
        delta = '<span class="t-delta' + (dd > 0 ? ' up' : '') + '">' + (dd > 0 ? '+' : '') + dd + '</span>';
      }
      var sideTags = '';
      if (r.sideEffects && r.sideEffects.length) {
        sideTags = '<div class="t-side-tags">' + r.sideEffects.map(function(s) { return '<span class="t-side-tag">' + s + '</span>'; }).join('') + '</div>';
      }
      var metaParts = [];
      if (r.site) metaParts.push(r.site);
      if (r.nota) metaParts.push(r.nota);
      return '<div class="t-row">' +
        '<div class="t-dot"></div>' +
        '<div class="t-body">' +
          '<div class="t-top">' +
            '<span class="t-date">' + formatDateBR(r.data) + '</span>' +
            (typeof r.peso === 'number' ? '<span class="t-weight">' + r.peso + ' kg</span>' : '') +
            delta +
            '<span class="t-dose-tag">' + r.dose + ' mg</span>' +
          '</div>' +
          (metaParts.length ? '<p class="t-meta">' + metaParts.join(' · ') + '</p>' : '') +
          sideTags +
        '</div>' +
        '<button class="t-del" data-rid="' + r.id + '">✕</button>' +
      '</div>';
    }).join('');
  }

  document.getElementById('btn-toggle-history').textContent = showAllHistory ? 'recentes ▴' : 'tudo ▾';
  document.getElementById('btn-toggle-history').style.display = ordenadosDesc.length > 5 ? 'inline-block' : 'none';

  var delBtns = tl.querySelectorAll('.t-del');
  for (var i = 0; i < delBtns.length; i++) {
    delBtns[i].onclick = function() {
      var rid = this.getAttribute('data-rid');
      var regs = getRegistros().filter(function(r) { return r.id !== rid; });
      saveRegistros(regs);
      renderRemedioPage();
      renderHomePage();
    };
  }
}

document.getElementById('btn-toggle-history').onclick = function() {
  showAllHistory = !showAllHistory;
  renderRemedioPage();
};

window.addEventListener('resize', function() {
  if (document.getElementById('page-remedio').classList.contains('visible')) drawChart(getRegistros());
});

/* ============ SHEET: nova aplicação ============ */
var sheetOverlay = document.getElementById('sheet-overlay');
var selectedSite = null;
var selectedSides = [];

document.getElementById('btn-abrir-sheet').onclick = function() {
  document.getElementById('input-data').valueAsDate = new Date();
  document.getElementById('input-peso').value = '';
  document.getElementById('input-nota').value = '';
  selectedSite = null;
  selectedSides = [];
  document.querySelectorAll('.site-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.chip').forEach(function(b) { b.classList.remove('active'); });
  sheetOverlay.classList.add('visible');
};
document.getElementById('btn-cancelar').onclick = function() { sheetOverlay.classList.remove('visible'); };
sheetOverlay.onclick = function(e) { if (e.target === sheetOverlay) sheetOverlay.classList.remove('visible'); };

document.querySelectorAll('.site-btn').forEach(function(btn) {
  btn.onclick = function() {
    var wasActive = this.classList.contains('active');
    document.querySelectorAll('.site-btn').forEach(function(b) { b.classList.remove('active'); });
    if (!wasActive) { this.classList.add('active'); selectedSite = this.getAttribute('data-site'); }
    else { selectedSite = null; }
  };
});
document.querySelectorAll('.chip').forEach(function(chip) {
  chip.onclick = function() {
    var side = this.getAttribute('data-side');
    var idx = selectedSides.indexOf(side);
    if (idx > -1) { selectedSides.splice(idx, 1); this.classList.remove('active'); }
    else { selectedSides.push(side); this.classList.add('active'); }
  };
});

document.getElementById('btn-salvar').onclick = function() {
  var data = document.getElementById('input-data').value;
  var dose = document.getElementById('input-dose').value;
  var pesoRaw = document.getElementById('input-peso').value;
  var nota = document.getElementById('input-nota').value.trim();
  if (!data || !dose) return;

  var registro = { id: Date.now().toString(), data: data, dose: dose };
  if (pesoRaw) registro.peso = parseFloat(pesoRaw);
  if (selectedSite) registro.site = selectedSite;
  if (selectedSides.length) registro.sideEffects = selectedSides.slice();
  if (nota) registro.nota = nota;

  var registros = getRegistros();
  registros.push(registro);
  saveRegistros(registros);

  sheetOverlay.classList.remove('visible');
  showToast('Aplicação registrada');
  renderRemedioPage();
  renderHomePage();
};

/* ============ INIT ============ */
renderHomePage();
</script>
